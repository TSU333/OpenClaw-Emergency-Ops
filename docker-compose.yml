services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: openclaw_ops
      POSTGRES_USER: openclaw
      POSTGRES_PASSWORD: openclaw
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build: .
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    command:
      [
        "uvicorn",
        "app.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
        "--reload"
      ]
    volumes:
      - .:/app

  worker:
    build: .
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    command:
      [
        "celery",
        "-A",
        "app.core.celery_app:celery_app",
        "worker",
        "--loglevel=info"
      ]
    volumes:
      - .:/app

volumes:
  postgres_data:

